<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AlphaPro Master Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e14;--card:#111827;--card2:#0f172a;--border:#1e293b;--border2:#334155;
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
  --font:"Bricolage Grotesque",system-ui,sans-serif;--mono:"JetBrains Mono",monospace;
  --accent:#34d399;--glow:rgba(52,211,153,.2);
}
html{scroll-behavior:smooth}
body{background:var(--bg);background-image:radial-gradient(900px 500px at 80% 0%,rgba(56,189,248,.07),transparent),radial-gradient(700px 400px at 5% 5%,rgba(52,211,153,.05),transparent);color:var(--text);font-family:var(--font);min-height:100vh;padding-bottom:60px}
body::-webkit-scrollbar{width:6px}
body::-webkit-scrollbar-thumb{background:#334155;border-radius:6px}
.wrap{max-width:1400px;margin:0 auto;padding:0 clamp(14px,2vw,40px)}

/* ---- TOP NAV ---- */
.sticky-header{position:sticky;top:0;z-index:100}
.top-bar{background:rgba(10,14,20,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 14px 0}
.top-title{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.top-title h1{font-size:18px;font-weight:800;letter-spacing:-.02em}
.top-title span{font-size:10px;font-family:var(--mono);color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.cal-tabs{display:flex;gap:2px;overflow-x:auto;padding-bottom:1px}
.cal-tabs::-webkit-scrollbar{display:none}
.cal-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font);font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
.cal-tab:hover{color:var(--text)}
.cal-tab.active{color:var(--text);border-bottom-color:var(--accent)}
.cal-tab .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ---- VIEWS ---- */
.view{display:none;padding-top:20px}
.view.active{display:block}

/* ---- MASTER DASHBOARD ---- */
.master-hdr{margin-bottom:20px}
.master-hdr h2{font-size:26px;font-weight:800;letter-spacing:-.02em}
.master-hdr p{font-size:12px;color:var(--muted);margin-top:2px}
.rings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
@media(max-width:500px){.rings-grid{grid-template-columns:repeat(2,1fr)}}
.mini-ring-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .15s;display:flex;flex-direction:column;align-items:center;gap:8px}
.mini-ring-card:hover{border-color:var(--border2)}
.mini-ring-wrap{position:relative;width:64px;height:64px}
.mini-ring-wrap svg{transform:rotate(-90deg)}
.mini-ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.mini-ring-pct{font-size:14px;font-weight:800;font-family:var(--mono)}
.mini-ring-lbl{font-size:7px;color:var(--muted);letter-spacing:.1em}
.mini-ring-name{font-size:11px;font-weight:700;text-align:center;line-height:1.2}
.mini-ring-count{font-size:10px;font-family:var(--mono);color:var(--muted)}

.today-section{margin-bottom:20px}
.section-hdr{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-hdr::after{content:"";flex:1;height:1px;background:var(--border)}
.group-divider{display:flex;align-items:center;gap:10px;margin:18px 0 10px;user-select:none;cursor:pointer}
.group-divider:hover .group-divider-label{opacity:.85}
.group-divider-label{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;padding:3px 10px;border-radius:6px;border:1px solid;transition:opacity .15s}
.group-divider-line{flex:1;height:1px;background:var(--border)}
.group-divider-prog{font-size:9px;font-family:var(--mono);color:var(--dim);white-space:nowrap}
.group-divider-chev{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.group-divider-chev.open{transform:rotate(90deg)}
.group-sessions{overflow:hidden;transition:max-height .25s ease}
.group-sessions.collapsed{display:none}
.today-empty{font-size:13px;color:var(--dim);padding:16px 0;text-align:center}

.master-cal-block{margin-bottom:16px}
.master-cal-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s}
.master-cal-hdr:hover{border-color:var(--border2)}
.master-cal-hdr.open{border-radius:12px 12px 0 0;border-bottom-color:transparent}
.mcal-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.mcal-name{font-size:13px;font-weight:700;flex:1}
.mcal-stats{font-size:10px;font-family:var(--mono);color:var(--muted)}
.mcal-chev{color:var(--dim);transition:transform .2s;font-size:12px}
.mcal-chev.open{transform:rotate(90deg)}
.master-cal-body{background:var(--card2);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;overflow:hidden;display:none}
.master-cal-body.open{display:block}

/* ---- CAL HEADER ---- */
.cal-hdr{padding:20px 0 16px}
.cal-hero{display:flex;align-items:center;gap:18px;background:linear-gradient(135deg,rgba(30,41,59,.7),rgba(15,23,42,.5));border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:16px}
.ring-wrap{position:relative;flex-shrink:0}
.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:18px;font-weight:800;font-family:var(--mono)}
.ring-lbl{font-size:7px;color:var(--muted);letter-spacing:.12em}
.hero-right{flex:1;min-width:0}
.hero-title{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1}
.hero-sub{font-size:11px;color:var(--muted);margin-top:2px;margin-bottom:8px}
.hero-count{font-size:14px;font-weight:600;font-family:var(--mono)}
.hero-count b{font-size:22px}
.hero-meta{display:flex;gap:12px;margin-top:8px;font-family:var(--mono);font-size:11px;color:var(--muted)}

/* ---- FILTER BAR ---- */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{background:rgba(30,41,59,.5);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-family:var(--mono);padding:4px 10px;cursor:pointer;transition:all .12s}
.filter-btn.active,.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:rgba(30,41,59,.9)}

/* ---- SESSION GROUPS ---- */
.group-block{margin-bottom:10px}
.group-hdr{display:flex;align-items:center;gap:10px;padding:7px 12px;background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .12s;margin-bottom:4px}
.group-hdr:hover{border-color:var(--border2)}
.group-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex:1}
.group-prog{font-size:10px;font-family:var(--mono);color:var(--muted)}
.group-chev{color:var(--dim);font-size:11px;transition:transform .2s}
.group-chev.open{transform:rotate(90deg)}
.group-body{display:none}
.group-body.open{display:block}
@media(min-width:900px){.group-body.open{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}}
@media(min-width:1200px){.group-body.open{grid-template-columns:repeat(3,1fr)}}

/* ---- SESSION CARD ---- */
.sess-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.sess-card:hover{border-color:var(--border2)}
.sess-card.done{opacity:.65}
.sess-card.today-pin{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.sess-card.today-pin .pin-badge{display:inline-block}
.pin-badge{display:none;font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 6px;border-radius:5px;background:#ef4444;color:#fff;margin-left:4px}
.sess-top{display:flex;align-items:center;gap:0;cursor:pointer}
.sess-check{width:40px;height:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.check-box{width:18px;height:18px;border-radius:5px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.check-box.done{border-color:transparent;background:var(--accent)}
.check-box svg{display:none}
.check-box.done svg{display:block}
.sess-info{flex:1;min-width:0;padding:10px 8px 10px 0}
.sess-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px}
.badge-code{font-size:9px;font-family:var(--mono);font-weight:700;padding:2px 6px;border-radius:5px;color:#0a0e14}
.badge-date{font-size:10px;font-family:var(--mono);color:var(--muted)}
.badge-today2{font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 6px;border-radius:5px;background:var(--accent);color:#0a0e14}
.badge-next{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;background:rgba(30,41,59,.8);color:var(--muted)}
.sess-title{font-size:13px;font-weight:700;line-height:1.25}
.sess-title.done{text-decoration:line-through;color:var(--muted)}
.sess-right{padding:10px 12px 10px 4px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.sub-ct{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:6px;background:rgba(30,41,59,.7);color:var(--muted)}
.chev-btn{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px;transition:transform .2s}
.chev-btn.open{transform:rotate(90deg)}

/* ---- SESSION BODY ---- */
.sess-body{padding:0 14px 14px 14px;border-top:1px solid rgba(30,41,59,.5);display:none}
.sess-body.open{display:block}
.sess-meta-row{display:flex;align-items:center;gap:14px;font-family:var(--mono);font-size:10px;color:var(--muted);padding:8px 0 10px}
.date-edit{background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;border-bottom:1px dashed var(--dim);padding:0;transition:color .12s}
.date-edit:hover{color:var(--text)}
.meta-edit-hint{font-size:9px;color:var(--dim);font-style:italic}
.time-edit{background:none;border:none;font-family:var(--mono);font-size:10px;color:var(--muted);cursor:pointer;border-bottom:1px dashed var(--dim);padding:0;transition:color .12s;margin-left:auto;white-space:nowrap}
.time-edit:hover{color:var(--text)}
.time-inputs-wrap{display:inline-flex;align-items:center;gap:4px;margin-left:auto}
.time-input{background:var(--card2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:10px;padding:2px 4px;width:88px}
.date-input{background:var(--card2);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:11px;padding:3px 8px;cursor:pointer}
.date-input:focus{outline:none;border-color:var(--accent)}
.sess-desc{font-size:12px;color:#cbd5e1;line-height:1.6;margin-bottom:12px}
.tasks-hdr,.notes-hdr{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.task-item{display:flex;align-items:flex-start;gap:8px;width:100%;background:none;border:none;color:var(--text);font-family:var(--font);text-align:left;padding:5px 6px;border-radius:8px;cursor:pointer;transition:background .12s}
.task-item:hover{background:rgba(30,41,59,.5)}
.task-box{width:14px;height:14px;border-radius:3px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.task-box.done{border-color:transparent;background:var(--accent)}
.task-box svg{display:none}
.task-box.done svg{display:block}
.task-txt{font-size:11.5px;line-height:1.4}
.task-txt.done{text-decoration:line-through;color:var(--muted)}
.tasks-wrap{margin-bottom:12px}
.notes-wrap{margin-top:0}

/* ---- FILE UPLOAD ---- */
.files-wrap{margin-top:14px;background:rgba(15,23,42,.6);border:1px solid var(--border2);border-radius:11px;padding:12px}
.files-hdr{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.fh-count{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);background:rgba(148,163,184,.14);padding:2px 7px;border-radius:6px}
.upload-label{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);border:none;border-radius:9px;color:#0a0e14;font-size:13.5px;font-weight:800;font-family:var(--font);padding:12px 14px;cursor:pointer;transition:all .15s;margin-bottom:7px}
.upload-label:hover{filter:brightness(1.12);transform:translateY(-1px)}
.upload-label:active{transform:translateY(0)}
.upload-label input[type=file]{display:none}
.upload-hint{font-size:10px;color:var(--dim);text-align:center;margin-bottom:8px}
.file-list{display:flex;flex-direction:column;gap:5px}
.file-item{display:flex;align-items:center;gap:8px;background:rgba(10,14,20,.7);border:1px solid var(--border);border-radius:8px;padding:7px 10px}
.file-icon{font-size:15px;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:9px;font-family:var(--mono);color:var(--dim)}
.file-actions{display:flex;gap:4px;flex-shrink:0}
.file-btn{background:rgba(30,41,59,.9);border:1px solid var(--border2);border-radius:6px;color:var(--muted);font-size:10px;font-weight:600;font-family:var(--font);padding:4px 9px;cursor:pointer;transition:all .12s}
.file-btn:hover{border-color:var(--border2);color:var(--text)}
.file-btn.del:hover{border-color:#f87171;color:#f87171}
.file-empty{font-size:10.5px;color:var(--dim);text-align:center;padding:2px 0}
.file-size-warn{font-size:10px;color:#fbbf24;padding:4px 0}
/* file-count badge shown on collapsed session cards */
.file-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:var(--mono);font-weight:700;padding:3px 7px;border-radius:6px;background:rgba(52,211,153,.16);color:var(--accent);white-space:nowrap}
textarea{width:100%;background:rgba(15,23,42,.7);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-family:var(--font);padding:8px 10px;resize:vertical;min-height:56px;line-height:1.5;transition:border-color .15s}
textarea::placeholder{color:var(--dim)}
textarea:focus{outline:none;border-color:var(--border2)}

/* ---- WORK DAYS BAR (APF only) ---- */
.work-days-bar{display:flex;align-items:center;gap:8px;background:rgba(15,23,42,.7);border:1px solid var(--border2);border-radius:14px;padding:12px 16px;margin-bottom:16px;flex-wrap:wrap}
.work-days-label{font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap;margin-right:2px}
.work-day-btn{background:rgba(30,41,59,.5);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;font-family:var(--mono);font-weight:700;padding:5px 10px;cursor:pointer;transition:all .15s;user-select:none}
.work-day-btn:hover{border-color:var(--border2);color:var(--text)}
.work-day-btn.active{background:rgba(52,211,153,.14);border-color:rgba(52,211,153,.45);color:#34d399;box-shadow:0 0 8px rgba(52,211,153,.12)}
.work-days-cascade-btn{margin-left:auto;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.35);border-radius:8px;color:#34d399;font-size:10px;font-family:var(--mono);font-weight:700;padding:5px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.work-days-cascade-btn:hover{background:rgba(52,211,153,.2);border-color:rgba(52,211,153,.55)}
.work-days-hint{font-size:9px;color:var(--dim);font-family:var(--mono);width:100%;margin-top:2px}

/* ---- SKIP / CARRIED-OVER STATES ---- */
.sess-card.skipped{border-color:rgba(251,191,36,.35);background:rgba(251,191,36,.03)}
.sess-card.carried-over{border-color:rgba(251,191,36,.55);background:rgba(251,191,36,.05);box-shadow:0 0 0 1px rgba(251,191,36,.2)}
.badge-skipped{font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:5px;background:rgba(251,191,36,.18);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.badge-carried{font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 7px;border-radius:5px;background:rgba(245,158,11,.2);color:#f59e0b;border:1px solid rgba(245,158,11,.45);animation:carriedPulse 2s ease-in-out infinite}
@keyframes carriedPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.0)}50%{box-shadow:0 0 6px 1px rgba(245,158,11,.25)}}
.carried-stack-wrap{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.22);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.carried-stack-hdr{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#f59e0b;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.carried-stack-item{font-size:11px;color:#fbbf24;padding:3px 0;border-bottom:1px solid rgba(251,191,36,.12);line-height:1.3}
.carried-stack-item:last-child{border-bottom:none;padding-bottom:0}
.carried-stack-code{font-family:var(--mono);font-size:9px;font-weight:700;background:rgba(251,191,36,.2);color:#fbbf24;padding:1px 5px;border-radius:4px;margin-right:6px}
.carried-sess-block{border:1px solid rgba(251,191,36,.2);border-radius:10px;overflow:hidden;margin-bottom:8px}
.carried-sess-block:last-child{margin-bottom:0}
.carried-sess-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.15);cursor:pointer;user-select:none}
.carried-sess-hdr:hover{background:rgba(251,191,36,.12)}
.carried-sess-title{font-size:11.5px;font-weight:700;color:#fbbf24;flex:1;line-height:1.25}
.carried-sess-prog{font-size:9px;font-family:var(--mono);color:rgba(251,191,36,.7);white-space:nowrap}
.carried-sess-chev{color:rgba(251,191,36,.6);font-size:10px;transition:transform .2s;flex-shrink:0}
.carried-sess-chev.open{transform:rotate(90deg)}
.carried-tasks{display:none;padding:6px 8px 8px}
.carried-tasks.open{display:block}
.carried-task-item{display:flex;align-items:flex-start;gap:8px;width:100%;background:none;border:none;color:var(--text);font-family:var(--font);text-align:left;padding:5px 6px;border-radius:7px;cursor:pointer;transition:background .12s}
.carried-task-item:hover{background:rgba(251,191,36,.07)}
.carried-task-box{width:14px;height:14px;border-radius:3px;border:2px solid rgba(251,191,36,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.carried-task-box.done{border-color:transparent;background:#f59e0b}
.carried-task-box svg{display:none}
.carried-task-box.done svg{display:block}
.carried-task-txt{font-size:11px;color:#e2c97e;line-height:1.4}
.carried-task-txt.done{text-decoration:line-through;color:rgba(251,191,36,.4)}
.skip-row{display:flex;align-items:center;gap:8px;padding:8px 0 2px;border-top:1px solid rgba(30,41,59,.5);margin-top:8px;cursor:pointer;user-select:none}
.skip-row:hover .skip-box{border-color:rgba(251,191,36,.6)}
.skip-box{width:15px;height:15px;border-radius:4px;border:2px solid rgba(251,191,36,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.skip-box.active{background:rgba(251,191,36,.25);border-color:#fbbf24}
.skip-label{font-size:10px;font-family:var(--mono);color:var(--muted)}

/* ---- HOURS WORKED SELECTOR (per session) ---- */
.hours-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid rgba(30,41,59,.5);margin-top:6px;flex-wrap:wrap}
.hours-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.hours-btn{background:rgba(30,41,59,.5);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:10px;font-family:var(--mono);font-weight:700;padding:4px 10px;cursor:pointer;transition:all .15s}

/* -- Utility: assign weekday dates starting from a date -- */
function weekdayDates(startISO, n) {
  const out=[], d=new Date(startISO+'T12:00:00');
  while(out.length<n){
    if(d.getDay()!==0&&d.getDay()!==6) out.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return out;
}

const SAVE_KEY = 'alphapro_master';
let diskHandle  = null;   // File System Access handle for auto-backup
let saveTimer   = null;

/* ── IndexedDB ─────────────────────────────────────────────────────────── */
let _db = null;
function _openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('CalendarAlphoDB',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('kv',{keyPath:'k'});
    req.onsuccess=e=>{_db=e.target.result;res(_db);};
    req.onerror=()=>rej(req.error);
  });
}
async function _dbSet(k,v){
  if(!_db) return;
  return new Promise((res,rej)=>{
    const tx=_db.transaction('kv','readwrite');
    tx.objectStore('kv').put({k,v});
    tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
  });
}
async function _dbGet(k){
  if(!_db) return null;
  return new Promise((res,rej)=>{
    const tx=_db.transaction('kv','readonly');
    const req=tx.objectStore('kv').get(k);
    req.onsuccess=()=>res(req.result?req.result.v:null);
    req.onerror=()=>rej(req.error);
  });
}

/* ── localStorage fallback ─────────────────────────────────────────────── */
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn('LS write fail',e)}},
};

/* ── File System Access (optional auto-backup / Google Drive) ───────────── */
async function _writeToDisk(jsonStr){
  if(!diskHandle) return;
  try{
    const w=await diskHandle.createWritable();
    await w.write(jsonStr); await w.close();
  }catch(e){
    console.warn('Disk write failed:',e);
    diskHandle=null; _updateBackupBtn();
  }
}
function _updateBackupBtn(){
  const btn=document.getElementById('backupBtn');
  if(!btn) return;
  if(diskHandle){
    btn.innerHTML='\u{1F4C1}\u00a0Backup: '+diskHandle._name;
    btn.style.color='#34d399';
    btn.title='Auto-backup active \u2014 click to change file';
  } else {
    btn.innerHTML='\u{1F4C1}\u00a0 Set Backup File';
    btn.style.color='';
    btn.title='Set a file for automatic backup \u2014 point to Google Drive for cloud saves';
  }
}
async function setBackupFile(){
  if(!window.showSaveFilePicker){
    alert('Auto-backup requires Edge or Chrome.\n\nUse \u201cExport All\u201d for manual backups.');
    return;
  }
  try{
    const handle=await window.showSaveFilePicker({
      suggestedName:'alphapro-autosave.json',
      types:[{description:'AlphaPro Backup',accept:{'application/json':['.json']}}],
    });
    diskHandle=handle; diskHandle._name=handle.name;
    _updateBackupBtn();
    setSaveUI('ok','Backup file set \u00b7 '+fmtNow());
    const snap=JSON.stringify({version:2,exported:new Date().toISOString(),progress:STATE.progress},null,2);
    await _writeToDisk(snap);
  }catch(e){ if(e.name!=='AbortError') console.warn('setBackupFile:',e); }
}

/* ── UI helper ─────────────────────────────────────────────────────────── */
function setSaveUI(state,msg){
  const dot=document.getElementById('saveDot');
  const time=document.getElementById('saveTime');
  const mode=document.getElementById('saveMode');
  if(!dot) return;
  dot.className='save-dot'+(state==='saving'?' saving':state==='error'?' error':'');
  if(msg) time.textContent=msg;
  if(mode){
    if(diskHandle){mode.textContent='FILE';mode.className='save-mode file';}
    else{mode.textContent='LOCAL';mode.className='save-mode local';}
  }
}
function fmtNow(){
  const d=new Date(),h=d.getHours(),m=String(d.getMinutes()).padStart(2,'0');
  return (h%12||12)+':'+m+' '+(h>=12?'PM':'AM');
}

/* ── Core save ─────────────────────────────────────────────────────────── */
async function saveState(){
  LS.set(SAVE_KEY,STATE.progress);
  setSaveUI('saving','Saving\u2026');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{
      await _dbSet(SAVE_KEY,STATE.progress);
      const snap=JSON.stringify({version:2,exported:new Date().toISOString(),progress:STATE.progress},null,2);
      await _writeToDisk(snap);
      setSaveUI('ok','Saved \u00b7 '+fmtNow());
    }catch(e){
      console.warn('saveState error:',e);
      setSaveUI('error','Save error \u2014 data in localStorage');
    }
  },600);
}

/* ── Load on startup ───────────────────────────────────────────────────── */
async function loadState(){
  let loaded=null;
  try{ await _openDB(); loaded=await _dbGet(SAVE_KEY); }
  catch(e){ console.warn('IndexedDB load failed:',e); }
  if(!loaded) loaded=LS.get(SAVE_KEY);
  return loaded||{};
}

/* ── Export / Import All ───────────────────────────────────────────────── */
function exportJSON(){
  const blob=new Blob([JSON.stringify({version:2,exported:new Date().toISOString(),progress:STATE.progress},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='alphapro-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  setSaveUI('ok','Backup exported \u00b7 '+fmtNow());
}
function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      const progress=data.progress||data;
      if(typeof progress!=='object') throw new Error('Invalid format');
      STATE.progress=progress;
      await saveState(); rerenderAll();
      setSaveUI('ok','Restored \u00b7 '+fmtNow());
    }catch(err){
      setSaveUI('error','Import failed'); alert('Could not import: '+err.message);
    }
  };
  reader.readAsText(file); input.value='';
}

/* ── State ─────────────────────────────────────────────────────────────── */
let STATE={activeCal:'master',openSess:{},openGroup:{},openMCal:{},progress:{}};

function getProg(calId, sessId){
  if(!STATE.progress[calId]) STATE.progress[calId]={};
  if(!STATE.progress[calId][sessId]) STATE.progress[calId][sessId]={done:false,tasks:{},notes:'',date:null,startTime:null,endTime:null,files:[],skipped:false};
  if(!STATE.progress[calId][sessId].files) STATE.progress[calId][sessId].files=[];
  if(STATE.progress[calId][sessId].startTime===undefined) STATE.progress[calId][sessId].startTime=null;
  if(STATE.progress[calId][sessId].endTime===undefined) STATE.progress[calId][sessId].endTime=null;
  if(STATE.progress[calId][sessId].skipped===undefined) STATE.progress[calId][sessId].skipped=false;
  if(STATE.progress[calId][sessId].hoursWorked===undefined) STATE.progress[calId][sessId].hoursWorked=2;
  return STATE.progress[calId][sessId];
}

/* ================================================================
   FILE UPLOAD HELPERS
   ================================================================ */
function fmtFileSize(bytes){
  if(bytes<1024) return bytes+'B';
  if(bytes<1048576) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}

function fileIcon(type){
  if(!type) return '📄';
  if(type.startsWith('image/')) return '🖼️';
  if(type.includes('pdf')) return '📕';
  if(type.includes('word')||type.includes('document')) return '📝';
  if(type.includes('sheet')||type.includes('excel')||type.includes('csv')) return '📊';
  if(type.includes('presentation')||type.includes('powerpoint')) return '📋';
  if(type.includes('zip')||type.includes('compressed')) return '🗜️';
  if(type.startsWith('video/')) return '🎬';
  if(type.startsWith('audio/')) return '🎵';
  if(type.startsWith('text/')) return '📄';
  return '📎';
}

function uploadFile(calId, sessId, input){
  const p = getProg(calId, sessId);
  const maxBytes = 15 * 1024 * 1024; // 15MB per file
  Array.from(input.files).forEach(file=>{
    if(file.size > maxBytes){
      alert(`"${file.name}" is ${fmtFileSize(file.size)} — max file size is 15MB.\nTip: for large files, attach a link in the Notes instead.`);
      return;
    }
    const reader = new FileReader();
    reader.onload = e=>{
      p.files.push({
        name: file.name,
        type: file.type,
        size: file.size,
        data: e.target.result,
        uploaded: new Date().toISOString(),
      });
      saveState();
      rerenderAll();
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function removeFile(calId, sessId, idx){
  const p = getProg(calId, sessId);
  if(!confirm(`Remove "${p.files[idx].name}"?`)) return;
  p.files.splice(idx, 1);
  saveState();
  rerenderAll();
}

async function downloadFile(calId, sessId, idx){
  const p = getProg(calId, sessId);
  const f = p.files[idx];
  const a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ================================================================
   HELPERS
   ================================================================ */
const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(iso){
  if(!iso) return 'TBD';
  const [y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return DOWS[dt.getDay()]+' '+MONS[m-1]+' '+d;
}

function todayISO(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')}

function fmtDateShort(iso){
  if(!iso) return '—';
  const [y,m,d]=iso.split('-').map(Number);
  return MONS[m-1]+' '+d;
}
function fmtRangeBadge(start, end){
  if(!start) return '—';
  if(!end||start===end) return fmtDateShort(start);
  return fmtDateShort(start)+' \u2013 '+fmtDateShort(end);
}
function fmtRangeFull(start, end){
  if(!start) return 'Set date';
  if(!end||start===end) return fmtDate(start);
  return fmtDate(start)+' \u2013 '+fmtDate(end);
}

function effectiveDate(calId, sessId, baseDate){
  return (STATE.progress[calId]&&STATE.progress[calId][sessId]&&STATE.progress[calId][sessId].date) || baseDate;
}

function getCalStats(calId){
  const cal=CALS[calId], total=cal.sessions.length;
  let done=0;
  cal.sessions.forEach(s=>{
    if(getProg(calId,s.id).done) done++;
  });
  return {done, total, pct:total?Math.round(done/total*100):0};
}

function nextSess(calId){
  const today=todayISO(), cal=CALS[calId];
  const future=cal.sessions.filter(s=>!getProg(calId,s.id).done&&!isSessionPulled(calId,s.id)&&(s.endDate||effectiveDate(calId,s.id,s.date))>=today);
  if(future.length) return future[0];
  return cal.sessions.find(s=>!getProg(calId,s.id).done&&!isSessionPulled(calId,s.id))||null;
}

function todaySessions(){
  const today=todayISO(), hits=[];
  CAL_ORDER.forEach(cid=>{
    CALS[cid].sessions.forEach(s=>{
      if(isSessionPulled(cid,s.id)) return;
      const start=effectiveDate(cid,s.id,s.date);
      const end=s.endDate||start;
      if(start<=today&&today<=end) hits.push({calId:cid,sess:s});
    });
  });
  return hits;
}

const SVGCHECK=`<svg width="10" height="10" fill="none" stroke="#0a0e14" stroke-width="3.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
const SVGRIGHT=`<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;

/* ================================================================
   RING SVG
   ================================================================ */
function ringPath(w,h,r,pct,color,bg,thick){
  const cx=w/2, cy=h/2, circ=2*Math.PI*r, dash=pct/100*circ;
  return `<svg width="${w}" height="${h}" style="transform:rotate(-90deg)">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${bg}" stroke-width="${thick}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${thick}"
      stroke-dasharray="${dash} ${circ}" stroke-linecap="round" style="transition:stroke-dasharray .4s ease"/>
  </svg>`;
}

/* ================================================================
   RENDER MASTER
   ================================================================ */
function renderMaster(){
  const today=todayISO();
  let html=`<div class="master-hdr"><h2>Master Dashboard</h2><p>All 6 calendars at a glance · ${fmtDate(today)}</p></div>`;

  // 6 mini rings
  html+=`<div class="section-hdr">Progress Overview</div><div class="rings-grid">`;
  CAL_ORDER.forEach(cid=>{
    const cal=CALS[cid], st=getCalStats(cid);
    const col=cal.color;
    html+=`<div class="mini-ring-card" onclick="switchTab('${cid}')" title="Go to ${cal.name}">
      <div class="mini-ring-wrap">
        ${ringPath(64,64,26,st.pct,col,'rgba(30,41,59,.7)',5)}
        <div class="mini-ring-txt">
          <div class="mini-ring-pct" style="color:${col}">${st.pct}%</div>
          <div class="mini-ring-lbl">DONE</div>
        </div>
      </div>
      <div class="mini-ring-name">${cid==='apf'?'🟢':cid==='dog'?'🐾':cid==='s6'?'📗':cid==='s63'?'📙':cid==='s65'?'📘':'📕'} ${cal.name}</div>
      <div class="mini-ring-count">${st.done}/${st.total}</div>
    </div>`;
  });
  html+=`</div>`;

  // Today's sessions
  const todayHits=todaySessions();
  html+=`<div class="section-hdr" style="margin-top:8px">Active Today</div>`;
  if(!todayHits.length){
    html+=`<div class="today-empty">No sessions scheduled for today.</div>`;
  } else {
    todayHits.forEach(({calId,sess})=>{
      const cal=CALS[calId], p=getProg(calId,sess.id);
      html+=`<div class="today-card" onclick="switchTab('${calId}')">
        <div class="today-dot" style="background:${cal.color}"></div>
        <div class="today-info">
          <div class="today-cal-name">${cal.name}${cal.hasTime?' · '+cal.time:' · anytime today'}</div>
          <div class="today-title"${p.done?' style="text-decoration:line-through;opacity:.5"':''}>${sess.title}</div>
        </div>
        ${p.done?`<span style="font-size:10px;font-family:var(--mono);color:#34d399">✓ done</span>`:''}
      </div>`;
    });
  }

  // Collapsible calendar summaries
  html+=`<div class="section-hdr" style="margin-top:4px">All Calendars</div>`;
  CAL_ORDER.forEach(cid=>{
    const cal=CALS[cid], st=getCalStats(cid);
    const isOpen=STATE.openMCal[cid];
    const next=nextSess(cid);
    html+=`<div class="master-cal-block">
      <div class="master-cal-hdr${isOpen?' open':''}" onclick="toggleMCal('${cid}')">
        <div class="mcal-dot" style="background:${cal.color}"></div>
        <div class="mcal-name">${cid==='apf'?'🟢':cid==='dog'?'🐾':cid==='s6'?'📗':cid==='s63'?'📙':cid==='s65'?'📘':'📕'} ${cal.name}</div>
        <div class="mcal-stats">${st.done}/${st.total} · ${st.pct}%</div>
        <div class="mcal-chev${isOpen?' open':''}">${SVGRIGHT}</div>
      </div>
      <div class="master-cal-body${isOpen?' open':''}">`;
    if(next){
      const nd=effectiveDate(cid,next.id,next.date);
      html+=`<div style="padding:10px 14px;font-size:12px;color:var(--muted)">
        <span style="color:${cal.color};font-weight:700">Next up:</span> ${next.title}
        <span style="font-family:var(--mono);font-size:10px;margin-left:6px">${fmtRangeBadge(nd,next.endDate||nd)}</span>
        <button onclick="switchTab('${cid}')" style="background:${cal.color};color:#0a0e14;border:none;border-radius:6px;font-size:10px;font-weight:700;font-family:var(--font);padding:3px 10px;margin-left:8px;cursor:pointer">Open →</button>
      </div>`;
    }
    html+=`</div></div>`;
  });

  return html;
}

/* ================================================================
   WORK DAYS BAR (APF, ATC, AJL)
   ================================================================ */
function renderWorkDaysBar(cid){
  const days=getWorkDays(cid);
  const LABELS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const ORDER=[1,2,3,4,5,6,0];
  let btns='';
  ORDER.forEach(d=>{
    const active=days.includes(d);
    btns+=`<button class="work-day-btn${active?' active':''}" onclick="toggleWorkDay('${cid}',${d})" title="${active?'Remove':'Add'} ${LABELS[d]}">${LABELS[d]}</button>`;
  });
  const selectedLabels=ORDER.filter(d=>days.includes(d)).map(d=>LABELS[d]).join(' · ');
  return `<div class="work-days-bar">
    <span class="work-days-label">Work Days</span>
    ${btns}
    <button class="work-days-cascade-btn" onclick="rebuildAllDates('${cid}')" title="Re-apply selected work days to all sessions from Session 1">↺ Re-cascade All</button>
    <span class="work-days-hint">Sessions cascade on: ${selectedLabels} — Set Session 1 date to fill all</span>
  </div>`;
}

/* ================================================================
   RENDER CALENDAR VIEW
   ================================================================ */
function renderCal(cid){
  const cal=CALS[cid], st=getCalStats(cid);
  const today=todayISO(), next=nextSess(cid);
  let html='';

  // TBD banner
  if(cal.hasTBD){
    html+=`<div class="tbd-banner">⚠️ <span>Dates are TBD — click any date on a session to set it. Progress saves automatically.</span></div>`;
  }

  // Work Days Bar (APF, ATC, AJL)
  if(WORKDAYS_CALS.includes(cid)){
    html+=renderWorkDaysBar(cid);
  }

  // Hero
  const hoursLeft=(st.total-st.done)*2;
  html+=`<div class="cal-hdr"><div class="cal-hero">
    <div class="ring-wrap">
      ${ringPath(80,80,32,st.pct,cal.color,'rgba(30,41,59,.8)',6)}
      <div class="ring-txt">
        <div class="ring-pct" style="color:${cal.color}">${st.pct}</div>
        <div class="ring-lbl">PERCENT</div>
      </div>
    </div>
    <div class="hero-right">
      <div class="hero-title">${cid==='apf'?'🟢':cid==='dog'?'🐾':cid==='s6'?'📗':cid==='s63'?'📙':cid==='s65'?'📘':cid==='atc'?'◈':cid==='ajl'?'📓':'📕'} ${cal.name}</div>
      <div class="hero-sub">${cal.sub}</div>
      <div class="hero-count"><b style="color:${cal.color}">${st.done}</b> / ${st.total} sessions</div>
      <div class="hero-meta">
        <span>🔥 ${st.done} done</span>
        <span>⏱ ${st.total-st.done} sessions left</span>
        ${cal.hasTime?`<span>🕙 ${cal.time}</span>`:`<span>🕒 No set time — anytime in the day</span>`}
      </div>
    </div>
  </div></div>`;

  // Pinned today
  const todayList=cal.sessions.filter(s=>{
    if(isSessionPulled(cid,s.id)) return false;
    const start=effectiveDate(cid,s.id,s.date),end=s.endDate||start;
    return start<=today&&today<=end;
  });
  if(todayList.length){
    html+=`<div class="section-hdr">Today</div>`;
    todayList.forEach(s=>{ html+=renderSessCard(cid,s,true); });
  }

  // Pinned next (if not already in today, and not pulled into another session)
  if(next && !todayList.find(s=>s.id===next.id) && !isSessionPulled(cid,next.id)){
    html+=`<div class="section-hdr">Up Next</div>`;
    html+=renderSessCard(cid,next,false,true);
  }

  // All sessions — flat in sequence order (array is already 1,2,3...), pulled sessions hidden
  const allSorted=[...cal.sessions]
    .filter(s=>!isSessionPulled(cid,s.id));

  const totalVisible=allSorted.length;
  const doneVisible=allSorted.filter(s=>getProg(cid,s.id).done).length;
  html+=`<div class="section-hdr" style="margin-top:8px">All Sessions <span style="font-family:var(--mono);font-size:10px;color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0">${doneVisible}/${totalVisible}</span></div>`;
  let lastGroup = null;
  let grpOpen = true;
  allSorted.forEach((s,i)=>{
    const grp = cal.groupKey(s);
    if(grp !== lastGroup){
      // Close previous group wrapper
      if(lastGroup !== null) html+=`</div>`;
      const grpSessions = cal.sessions.filter(gs=>cal.groupKey(gs)===grp&&!isSessionPulled(cid,gs.id));
      const grpDone = grpSessions.filter(gs=>getProg(cid,gs.id).done).length;
      const gKey = cid+'::'+grp;
      grpOpen = STATE.openGroup[gKey]!==false;
      const safeGrp = grp.replace(/'/g,"\\'");
      html+=`<div class="group-divider" onclick="toggleGroup('${cid}','${safeGrp}')">
        <span class="group-divider-chev${grpOpen?' open':''}">▶</span>
        <span class="group-divider-label" style="color:${cal.color};border-color:${cal.color}33;background:${cal.color}12">${grp}</span>
        <span class="group-divider-line"></span>
        <span class="group-divider-prog">${grpDone}/${grpSessions.length}</span>
      </div>
      <div class="group-sessions${grpOpen?'':' collapsed'}">`;
      lastGroup = grp;
    }
    html+=renderSessCard(cid,s);
  });
  // Close last group wrapper
  if(lastGroup !== null) html+=`</div>`;

  return html;
}

function renderSessCard(cid, s, isToday=false, isNext=false){
  const cal=CALS[cid], p=getProg(cid,s.id);
  const eDate=effectiveDate(cid,s.id,s.date);
  const eEnd=(p.dateEnd||s.endDate||eDate);
  const hasRange=!!(s.endDate);
  const sKey=cid+'::'+s.id;
  const isOpen=STATE.openSess[sKey];
  const tasksDone=s.tasks?s.tasks.filter((_,i)=>p.tasks[i]).length:0;
  const code=cal.codeOf(s);
  const today=todayISO();
  const isActualToday=eDate<=today&&today<=eEnd;

  // Work-days calendars skip / carried-over logic (APF, ATC, AJL)
  const isWorkDaysCal = WORKDAYS_CALS.includes(cid);
  const isSkipped = isWorkDaysCal && p.skipped && !p.done;
  const carriedSessions = isWorkDaysCal ? getCarriedSessions(cid,s.id) : [];
  const pulledSessions  = isWorkDaysCal ? getPulledSessions(cid,s.id)  : [];
  const hasCarried = carriedSessions.length > 0;
  const hasPulled  = pulledSessions.length  > 0;

  const timeKey=sKey.replace(/[^a-z0-9]/gi,'_');
  const calDefaults=parseCalTime(cal.time);
  const sessStart=p.startTime||calDefaults.start;
  const sessEnd=p.endTime||calDefaults.end;
  const timeSpan=cal.hasTime
    ? `<span id="time-display-${timeKey}" class="time-edit" onclick="editSessionTime(event,'${cid}','${s.id}')" title="Tap to change session time">🕙 ${sessStart?fmtTime24(sessStart):'Set start'} – ${sessEnd?fmtTime24(sessEnd):'Set end'}</span>`
    : `<span style="margin-left:auto;font-size:10px">🕒 anytime</span>`;

  const dateMetaRow = hasRange
    ? `<span>📅</span>
       <span id="date-display-${sKey.replace(/[^a-z0-9]/gi,'_')}" class="date-edit" onclick="editDate(event,'${cid}','${s.id}')" title="Tap to change start date">${eDate?fmtDate(eDate):'Set start'}</span>
       <span style="color:var(--muted);padding:0 4px">&rarr;</span>
       <span id="date-end-display-${sKey.replace(/[^a-z0-9]/gi,'_')}" class="date-edit" onclick="editEndDate(event,'${cid}','${s.id}')" title="Tap to change end date">${eEnd?fmtDate(eEnd):'Set end'}</span>
       ${timeSpan}`
    : `<span>📅</span>
       <span id="date-display-${sKey.replace(/[^a-z0-9]/gi,'_')}" class="date-edit" onclick="editDate(event,'${cid}','${s.id}')">${eDate?fmtDate(eDate):'Set date'}</span>
       <span class="meta-edit-hint">tap to change date</span>
       ${timeSpan}`;

  // Card class modifiers
  let cardClass='sess-card';
  if(p.done) cardClass+=' done';
  if(isActualToday&&!isSkipped&&!hasCarried) cardClass+=' today-pin';
  if(isSkipped) cardClass+=' skipped';
  if(hasCarried) cardClass+=' carried-over';
  if(hasPulled)  cardClass+=' has-pulled';

  // Carried-over stack block (shows inside session body, before tasks)
  let carriedBlock='';
  if(hasCarried){
    const SVGCHECK_AMB=`<svg width="9" height="9" fill="none" stroke="#0a0e14" stroke-width="3.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;
    const blocks=carriedSessions.map(cs=>{
      const csp=getProg(cid,cs.id);
      const csCode=cal.codeOf(cs);
      const csKey=(cid+'::'+cs.id+'::carried').replace(/[^a-z0-9]/gi,'_');
      const csOpen=STATE.openSess['carried::'+cid+'::'+cs.id]!==false; // open by default
      const tasksDoneCs=cs.tasks?cs.tasks.filter((_,i)=>csp.tasks[i]).length:0;
      const totalCs=cs.tasks?cs.tasks.length:0;
      let taskHtml='';
      if(cs.tasks&&cs.tasks.length){
        taskHtml=cs.tasks.map((t,i)=>`
          <button class="carried-task-item" onclick="toggleTask('${cid}','${cs.id}',${i})">
            <div class="carried-task-box${csp.tasks[i]?' done':''}">${SVGCHECK_AMB}</div>
            <span class="carried-task-txt${csp.tasks[i]?' done':''}">${t}</span>
          </button>`).join('');
      }
      return `<div class="carried-sess-block">
        <div class="carried-sess-hdr" onclick="toggleCarriedSess('${cid}','${cs.id}')">
          <span class="carried-stack-code">${csCode}</span>
          <span class="carried-sess-title">${cs.title}</span>
          <span class="carried-sess-prog">${tasksDoneCs}/${totalCs} tasks</span>
          <span class="carried-sess-chev${csOpen?' open':''}">▶</span>
        </div>
        <div class="carried-tasks${csOpen?' open':''}">
          ${taskHtml||'<div style="font-size:11px;color:rgba(251,191,36,.5);padding:4px 6px">No tasks listed</div>'}
        </div>
      </div>`;
    }).join('');
    carriedBlock=`<div class="carried-stack-wrap">
      <div class="carried-stack-hdr">⚡ Carried Over — ${carriedSessions.length} skipped session${carriedSessions.length>1?'s':''} due today</div>
      ${blocks}
    </div>`;
  }

  // Skip row (APF, ATC, AJL only — inside body)
  const skipRow = isWorkDaysCal ? `<div class="skip-row" onclick="toggleSkip(event,'${cid}','${s.id}')">
    <div class="skip-box${isSkipped?' active':''}">
      ${isSkipped?`<svg width="9" height="9" fill="none" stroke="#fbbf24" stroke-width="3" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`:''}
    </div>
    <span class="skip-label">${isSkipped?'⚡ Skipped — work carries to next session':'Skip this day — stacks on next work day'}</span>
  </div>` : '';

  let html=`<div class="${cardClass}" id="sc-${sKey.replace(/[^a-z0-9]/gi,'_')}">
    <div class="sess-top">
      <div class="sess-check" onclick="toggleDone(event,'${cid}','${s.id}')">
        <div class="check-box${p.done?' done':''}">${SVGCHECK}</div>
      </div>
      <div class="sess-info" onclick="toggleSess('${cid}','${s.id}')">
        <div class="sess-badges">
          <span class="badge-code" style="background:${cal.color}">${code}</span>
          <span class="badge-date">${fmtRangeBadge(eDate,eEnd)}</span>
          ${isActualToday&&!isSkipped?`<span class="badge-today2">TODAY</span>`:''}
          ${isNext&&!isActualToday&&!isSkipped?`<span class="badge-next">NEXT UP</span>`:''}
          ${isSkipped?`<span class="badge-skipped">⚡ SKIPPED</span>`:''}
          ${hasCarried?`<span class="badge-carried">⚡ CARRIED OVER ×${carriedSessions.length}</span>`:''}
          ${hasPulled?`<span class="badge-pulled">⚡ +${pulledSessions.length} PULLED IN</span>`:''}
        </div>
        <div class="sess-title${p.done?' done':''}">${s.title}</div>
      </div>
      <div class="sess-right" onclick="toggleSess('${cid}','${s.id}')">
        ${(p.files&&p.files.length)?`<span class="file-badge" title="${p.files.length} file(s) attached">📎 ${p.files.length}</span>`:''}
        ${s.tasks&&s.tasks.length?`<span class="sub-ct">${tasksDone}/${s.tasks.length}</span>`:''}
        <button class="chev-btn${isOpen?' open':''}">
          ${SVGRIGHT}
        </button>
      </div>

        const blocks=pulledSessions.map(ps=>{
          const psp=getProg(cid,ps.id);

          const totalPs=ps.tasks?ps.tasks.length:0;
          const taskHtml=ps.tasks&&ps.tasks.length
            ?ps.tasks.map((t,i)=>`<button class="pulled-task-item" onclick="toggleTask('${cid}','${ps.id}',${i})">

              <span class="pulled-task-txt${psp.tasks[i]?' done':''}">${t}</span>
            </button>`).join('')
            :'<div style="font-size:11px;color:rgba(56,189,248,.4);padding:4px 6px">No tasks listed</div>';
          return `<div class="pulled-sess-block${psp.done?' pulled-done':''}">
            <div class="pulled-sess-hdr" onclick="togglePulledSess('${cid}','${ps.id}')">
              <div class="pulled-done-btn" onclick="togglePulledDone(event,'${cid}','${ps.id}')" title="${psp.done?'Mark incomplete':'Mark complete'}">
                <div class="pulled-done-box${psp.done?' done':''}">${SVGCHECK_BLU}</div>
              </div>
              <span class="carried-stack-code" style="background:rgba(56,189,248,.18);color:#38bdf8">${psCode}</span>
              <span class="pulled-sess-title${psp.done?' pulled-title-done':''}">${ps.title}</span>
              <span class="pulled-orig-date">orig: ${fmtDate(psOrigDate)}</span>
              <span class="pulled-sess-prog">${tasksDonePs}/${totalPs} tasks</span>
              <span class="pulled-sess-chev${psOpen?' open':''}">▶</span>
            </div>
            <div class="pulled-tasks${psOpen?' open':''}">
              ${taskHtml}
            </div>
          </div>`;
        }).join('');
        return `<div class="pulled-stack-wrap">
          <div class="pulled-stack-hdr">⚡ Pulled Forward — ${pulledSessions.length} future session${pulledSessions.length>1?'s':''} done today</div>
          ${blocks}
        </div>`;
      })()}      <div class="files-wrap">
        <div class="files-hdr">📎 Session Files ${(p.files&&p.files.length)?`<span class="fh-count">${p.files.length} attached</span>`:''}</div>
        <label class="upload-label">
          📎 Attach File
          <input type="file" multiple onchange="uploadFile('${cid}','${s.id}',this)">
        </label>
        <div class="upload-hint">Save working files, exports or screenshots here — up to 15MB each</div>
        <div class="file-list">
          ${(p.files&&p.files.length)?p.files.map((f,i)=>`
            <div class="file-item">
              <span class="file-icon">${fileIcon(f.type)}</span>
              <div class="file-info">
                <div class="file-name">${f.name}</div>
                <div class="file-meta">${fmtFileSize(f.size)} · ${new Date(f.uploaded).toLocaleDateString()}</div>
              </div>
              <div class="file-actions">
                <button class="file-btn" onclick="downloadFile('${cid}','${s.id}',${i})">↓ Open</button>
                <button class="file-btn del" onclick="removeFile('${cid}','${s.id}',${i})">✕</button>
              </div>
            </div>`).join(''):'<div class="file-empty">No files attached yet</div>'}
        </div>
      </div>
      <div class="notes-wrap" style="margin-top:14px">
        <div class="notes-hdr">Notes</div>
        <textarea placeholder="Add notes for this session…" oninput="saveNote('${cid}','${s.id}',this.value)">${p.notes||''}</textarea>
      </div>
      ${isWorkDaysCal ? `<div class="hours-row">
        <span class="hours-label">Hours Today</span>
        ${[2,4,6,8].map(h=>`<button class="hours-btn${(p.hoursWorked||2)===h?' active':''}" onclick="logHours('${cid}','${s.id}',${h})">${h} hrs</button>`).join('')}
        <span class="hours-note">${(p.hoursWorked||2)===2?'1 session':'= '+(Math.floor((p.hoursWorked||2)/2))+' sessions today'}</span>
      </div>` : ''}
      ${skipRow}
    </div>
  </div>`;
  return html;
}

}

function toggleSess(calId, sessId){

function toggleDone(e, calId, sessId){

function togglePulledDone(e, calId, sessId){

function toggleTask(calId, sessId, idx){
  const p=getProg(calId,sessId);
  p.tasks[idx]=!p.tasks[idx];
  // Auto-complete session when all tasks checked; uncheck if any un-ticked
  const sess=CALS[calId].sessions.find(s=>s.id===sessId);
  if(sess&&sess.tasks&&sess.tasks.length>0){
    p.done = sess.tasks.every((_,i)=>p.tasks[i]);
  }
  saveState();
  rerenderAll();
}

function saveNote(calId, sessId, text){

  p.notes=text;
  saveState();
}

/* ---- weekday cascade helpers ---- */
function snapWeekday(isoDate){
  // Push Saturday → Monday, Sunday → Monday. Never stores a weekend date.
  if(!isoDate) return isoDate;
  const [y,m,d]=isoDate.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  if(dt.getDay()===6) dt.setDate(dt.getDate()+2); // Sat → Mon
  if(dt.getDay()===0) dt.setDate(dt.getDate()+1); // Sun → Mon
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function addWeekdays(isoDate, n){
  if(!isoDate) return isoDate;
  const [y,m,d]=isoDate.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  // Always start from a weekday — snap existing weekend dates first
  if(dt.getDay()===6) dt.setDate(dt.getDate()+2);
  if(dt.getDay()===0) dt.setDate(dt.getDate()+1);
  if(n===0) return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
  const step=n>0?1:-1;
  let remaining=Math.abs(n);
  while(remaining>0){
    dt.setDate(dt.getDate()+step);
    if(dt.getDay()!==0&&dt.getDay()!==6) remaining--;
  }
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function weekdayDiff(fromISO, toISO){
  if(!fromISO||!toISO) return 0;
  // Snap both endpoints to weekdays before calculating delta
  const sf=snapWeekday(fromISO), st=snapWeekday(toISO);
  if(sf===st) return 0;
  const from=new Date(sf+'T12:00:00'), to=new Date(st+'T12:00:00');
  const step=to>from?1:-1;
  let count=0, cur=new Date(from);
  while(cur.getTime()!==to.getTime()){
    cur.setDate(cur.getDate()+step);
    if(cur.getDay()!==0&&cur.getDay()!==6) count+=step;
  }
  return count;
}

/* ---- Work Days system (APF, ATC, AJL) ---- */
const WORKDAYS_CALS = ['apf','atc','ajl'];
function getWorkDays(calId){
  const k='_'+calId+'_settings';
  return (STATE.progress[k]&&STATE.progress[k].workDays)||[1,2,3,4,5];
}
function saveWorkDays(calId,days){
  const k='_'+calId+'_settings';
  if(!STATE.progress[k]) STATE.progress[k]={};
  STATE.progress[k].workDays=days;
  saveState();
}
function toggleWorkDay(calId,dayNum){
  const days=[...getWorkDays(calId)];
  const idx=days.indexOf(dayNum);
  if(idx>=0){
    if(days.length===1) return;
    days.splice(idx,1);
  } else {
    days.push(dayNum);
    days.sort((a,b)=>a-b);
  }
  saveWorkDays(calId,days);
  rerenderAll();
}
function snapToWorkDay(isoDate,calId){
  if(!isoDate) return isoDate;
  const workDays=getWorkDays(calId);
  const [y,m,d]=isoDate.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  if(workDays.includes(dt.getDay())) return isoDate;
  for(let i=0;i<14;i++){
    dt.setDate(dt.getDate()+1);
    if(workDays.includes(dt.getDay())){
      return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    }
  }
  return isoDate;
}
function nextWorkDay(isoDate,calId){
  const workDays=getWorkDays(calId);
  if(!isoDate||!workDays.length) return isoDate;
  const [y,m,d]=isoDate.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  for(let i=0;i<14;i++){
    dt.setDate(dt.getDate()+1);
    if(workDays.includes(dt.getDay())){
      return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
    }
  }
  return isoDate;
}
function cascadeFrom(calId,startSessIdx,startDate){
  const sessions=CALS[calId].sessions;
  let cur=startDate;
  for(let i=startSessIdx+1;i<sessions.length;i++){
    cur=nextWorkDay(cur,calId);
    getProg(calId,sessions[i].id).date=cur;
  }
}
function rebuildAllDates(calId){
  const sessions=CALS[calId].sessions;
  const p0=getProg(calId,sessions[0].id);
  const start=p0.date||sessions[0].date;
  if(!start) return;
  const snapped=snapToWorkDay(start,calId);
  p0.date=snapped;
  cascadeFrom(calId,0,snapped);
  saveState();
  rerenderAll();
}

/* ---- Skip Day (APF only) ---- */
function toggleSkip(e,calId,sessId){
  e.stopPropagation();
  const p=getProg(calId,sessId);
  p.skipped=!p.skipped;
  saveState();
  rerenderAll();
}
function getCarriedSessions(calId,sessId){
  const sessions=CALS[calId].sessions;
  const idx=sessions.findIndex(s=>s.id===sessId);
  const carried=[];
  let i=idx-1;
  while(i>=0){
    const p=getProg(calId,sessions[i].id);
    if(p.skipped&&!p.done){
      carried.unshift(sessions[i]);
      i--;
    } else { break; }
  }
  return carried;
}

/* ---- Hours Worked / Pull-Forward (per session, APF ATC AJL) ---- */
function getPulledSessions(calId,sessId){
  const p=getProg(calId,sessId);
  const hours=p.hoursWorked||2;
  const extra=Math.floor(hours/2)-1;
  if(extra<=0) return [];
  const sessions=CALS[calId].sessions;
  const idx=sessions.findIndex(s=>s.id===sessId);
  return sessions.slice(idx+1, idx+1+extra);
}
function logHours(calId,sessId,hours){
  const p=getProg(calId,sessId);
  p.hoursWorked=hours;
  const sessions=CALS[calId].sessions;
  const idx=sessions.findIndex(s=>s.id===sessId);
  const currentDate=p.date||sessions[idx].date;
  const extra=Math.floor(hours/2)-1;
  // Pull extra sessions onto the current date
  for(let i=1;i<=extra&&idx+i<sessions.length;i++){
    getProg(calId,sessions[idx+i].id).date=currentDate;
  }
  // Cascade everything after the last pulled session
  const lastAffected=idx+Math.max(extra,0);
  cascadeFrom(calId,lastAffected,currentDate);
  saveState();
  rerenderAll();
}
function togglePulledSess(calId,sessId){
  const k='pulled::'+calId+'::'+sessId;
  STATE.openSess[k]=STATE.openSess[k]===false?true:false;
  rerenderAll();
}
function isSessionPulled(calId,sessId){
  if(!WORKDAYS_CALS.includes(calId)) return false;
  const sessions=CALS[calId].sessions;
  const idx=sessions.findIndex(s=>s.id===sessId);
  for(let j=0;j<idx;j++){
    const pj=getProg(calId,sessions[j].id);
    const extra=Math.floor((pj.hoursWorked||2)/2)-1;
    if(extra>0 && idx<=j+extra) return true;
  }
  return false;
}

function editDate(e, calId, sessId){
  e.stopPropagation();
  const key=calId+'::'+sessId;
  const dispId='date-display-'+key.replace(/[^a-z0-9]/gi,'_');
  const dispEl=document.getElementById(dispId);
  if(!dispEl) return;
  const p=getProg(calId,sessId);
  const sess=CALS[calId].sessions.find(s=>s.id===sessId);
  const cur=(p.date||sess.date)||'';
  const inp=document.createElement('input');
  inp.type='date'; inp.className='date-input'; inp.value=cur;
  dispEl.replaceWith(inp);
  inp.focus();
  inp.onchange=()=>{
    // For work-days calendars: snap to valid work day; for others: snap to weekday
    const newDate = WORKDAYS_CALS.includes(calId) ? snapToWorkDay(inp.value,calId) : snapWeekday(inp.value);
    if(inp.value!==newDate) inp.value=newDate;

    const allSessions = CALS[calId].sessions;
    const idx = allSessions.findIndex(s=>s.id===sessId);

    if(WORKDAYS_CALS.includes(calId)){
      // APF / ATC / AJL: forward-fill ALL sessions after this one using selected work days
      cascadeFrom(calId, idx, newDate);
    } else {
      // Shift already-dated sessions by the same weekday delta (Series calendars)
      if(cur && cur!==newDate){
        const delta=weekdayDiff(cur, newDate);
        if(delta!==0){
          for(let i=idx+1;i<allSessions.length;i++){
            const pr=getProg(calId,allSessions[i].id);
            const base=pr.date||allSessions[i].date||'';
            if(base) pr.date=addWeekdays(base, delta);
          }
        }
      }
    }

    p.date=newDate;
    saveState();
    rerenderAll();
  };
  inp.onblur=()=>rerenderAll();
}

function editEndDate(e, calId, sessId){
  e.stopPropagation();
  const key=calId+'::'+sessId;
  const dispId='date-end-display-'+key.replace(/[^a-z0-9]/gi,'_');
  const dispEl=document.getElementById(dispId);
  if(!dispEl) return;
  const p=getProg(calId,sessId);
  const sess=CALS[calId].sessions.find(s=>s.id===sessId);
  const cur=(p.dateEnd||sess.endDate)||'';
  const inp=document.createElement('input');
  inp.type='date'; inp.className='date-input'; inp.value=cur;
  dispEl.replaceWith(inp);
  inp.focus();
  inp.onchange=()=>{p.dateEnd=snapWeekday(inp.value);saveState();rerenderAll();};
  inp.onblur=()=>rerenderAll();
}

/* ---- Time helpers -------------------------------------------------- */
function parseTime12(t){
  // "10 PM" → "22:00" · "11:59 PM" → "23:59" · "12 AM" → "00:00"
  const m=t.trim().match(/^(\d+)(?::(\d+))?\s*(AM|PM)$/i);
  if(!m) return null;
  let h=parseInt(m[1]), min=parseInt(m[2]||'0');
  const ap=m[3].toUpperCase();
  if(ap==='PM'&&h!==12) h+=12;
  if(ap==='AM'&&h===12) h=0;
  return String(h).padStart(2,'0')+':'+String(min).padStart(2,'0');
}
function parseCalTime(str){
  // "10 PM – 12 AM" → {start:'22:00', end:'00:00'}
  if(!str||str==='Anytime') return {start:null,end:null};
  const parts=str.split(/\s*[–—-]\s*/);
  if(parts.length<2) return {start:null,end:null};
  return {start:parseTime12(parts[0]),end:parseTime12(parts[1])};
}
function fmtTime24(t24){
  // "22:00" → "10:00 PM" · "00:00" → "12:00 AM"
  if(!t24) return '';
  const [h,m]=t24.split(':').map(Number);
  const ap=h>=12?'PM':'AM';
  const h12=h%12||12;
  return h12+':'+(m?String(m).padStart(2,'0'):'00')+' '+ap;
}

function editSessionTime(e, calId, sessId){
  e.stopPropagation();
  const sKey=calId+'::'+sessId;
  const timeKey='time-display-'+sKey.replace(/[^a-z0-9]/gi,'_');
  const dispEl=document.getElementById(timeKey);
  if(!dispEl) return;
  const p=getProg(calId,sessId);
  const defaults=parseCalTime(CALS[calId].time);
  const curStart=p.startTime||defaults.start||'';
  const curEnd=p.endTime||defaults.end||'';

  const wrap=document.createElement('span');
  wrap.className='time-inputs-wrap';

  const startInp=document.createElement('input');
  startInp.type='time'; startInp.className='time-input'; startInp.value=curStart;
  const sep=document.createElement('span');
  sep.textContent='–'; sep.style.color='var(--muted)';
  const endInp=document.createElement('input');
  endInp.type='time'; endInp.className='time-input'; endInp.value=curEnd;

  wrap.appendChild(startInp); wrap.appendChild(sep); wrap.appendChild(endInp);
  dispEl.replaceWith(wrap);
  startInp.focus();

  function save(){
    p.startTime=startInp.value||null;
    p.endTime=endInp.value||null;
    saveState(); rerenderAll();
  }
  startInp.onchange=save;
  endInp.onchange=save;
  endInp.onblur=()=>{ if(document.activeElement!==startInp) rerenderAll(); };
}
function rerenderAll(){
  const cid=STATE.activeCal;
  const wrap=document.getElementById('mainWrap');
  if(cid==='master'){
    wrap.innerHTML=renderMaster();
  } else {
    wrap.innerHTML=renderCal(cid);
  }
  // Rebuild tabs
  buildTabs();
}

function buildTabs(){
  const tabs=document.getElementById('calTabs');
  const cid=STATE.activeCal;
  let html=`<button class="cal-tab${cid==='master'?' active':''}" data-cal="master" onclick="switchTab('master')">
    ⊞ MASTER
  </button>`;
  CAL_ORDER.forEach(id=>{
    const cal=CALS[id], st=getCalStats(id);
    html+=`<button class="cal-tab${cid===id?' active':''}" data-cal="${id}" onclick="switchTab('${id}')"
      style="${cid===id?'--accent:'+cal.color:''}">
      <div class="dot" style="background:${cal.color}"></div>
      ${cal.name}
      <span style="font-family:var(--mono);font-size:9px;color:var(--dim);margin-left:2px">${st.pct}%</span>
    </button>`;
  });
  tabs.innerHTML=html;
  // Set accent on active tab
  if(cid!=='master'&&CALS[cid]){
    document.documentElement.style.setProperty('--accent',CALS[cid].color);
  } else {
    document.documentElement.style.setProperty('--accent','#34d399');
  }

  // ── Per-calendar save button ──────────────────────────────────
  const wrap   = document.getElementById('calSaveBtnWrap');
  const saveBtn= document.getElementById('calSaveBtn');
  const saveLbl= document.getElementById('calSaveBtnLabel');
  const impLbl = document.getElementById('calImportBtnLabel');
  if(wrap && saveBtn){
    if(cid === 'master' || !CALS[cid]){
      wrap.style.display = 'none';
    } else {
      const cal   = CALS[cid];
      const color = cal.color;
      wrap.style.display = 'flex';
      saveLbl.textContent = `Save ${cal.name}`;
      impLbl.textContent  = `Restore ${cal.name}`;
      // Tint the button border + text to match the calendar's color
      saveBtn.style.borderColor = color;
      saveBtn.style.color       = color;
    }
  }
}

/* ================================================================
   INIT
   ================================================================ */
window.addEventListener('DOMContentLoaded', ()=>{
  let initialized = false;
  async function initApp(){
    if(initialized) return;
    initialized = true;
    STATE.progress = await loadState();
    // Phases 1-4 were completed before this calendar was built — mark done
    ['APF-P1','APF-P2','APF-P3','APF-P4'].forEach(id=>{
      const p=getProg('apf',id);
      if(!p.done){
        p.done=true;
        const sess=CALS['apf'].sessions.find(s=>s.id===id);
        if(sess&&sess.tasks) sess.tasks.forEach((_,i)=>{ p.tasks[i]=true; });
      }
    });
    buildTabs();
    rerenderAll();
    const existing = LS.get(SAVE_KEY);
    setSaveUI('ok', existing ? 'Loaded · '+fmtNow() : 'Ready — no saved data yet');
    _updateBackupBtn();
  }
  initApp();
});
